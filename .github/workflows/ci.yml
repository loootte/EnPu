# EnPu CI — core unit tests + desktop build + print_clear accuracy gate (#38)
name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  core:
    name: Core (pytest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: core
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: core/requirements-ci.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt

      - name: Run tests (mock OCR)
        env:
          ENPU_RECOGNIZE_ENGINE: mock
        run: pytest -q --tb=short

  desktop:
    name: Desktop (tsc + vite build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck + production build
        run: npm run build
        env:
          VITE_ENPU_CORE_URL: http://127.0.0.1:8765

  # Accuracy baseline gate (issue #29 / #38) — synthetic print_clear only
  eval-print-clear:
    name: Eval print_clear F1 ≥ 60%
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            core/requirements-ci.txt
            core/requirements-eval.txt

      - name: Install eval dependencies (PaddleOCR)
        working-directory: core
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-eval.txt

      - name: Cache PaddleOCR models
        uses: actions/cache@v4
        with:
          path: |
            ~/.paddleocr
            ~/.paddlex
          key: paddleocr-models-${{ runner.os }}-py312-v1

      - name: Ensure print_clear images present
        run: |
          n=$(find samples/eval/images -name 'E0*_print_*.png' 2>/dev/null | wc -l)
          echo "print_clear images: $n"
          if [ "$n" -lt 10 ]; then
            python scripts/generate-eval-samples.py
          fi
          test -f samples/eval/manifest.json

      - name: Run accuracy gate (print_clear, min F1 0.60)
        env:
          ENPU_RECOGNIZE_ENGINE: paddleocr
          # Avoid GUI/backends noise in CI
          MPLBACKEND: Agg
        run: |
          python scripts/eval-accuracy.py \
            --run \
            --engine paddleocr \
            --subset print_clear \
            --min-f1 0.60 \
            --min-f1-subset print_clear \
            --out samples/eval/reports/ci-print-clear.json

      - name: Upload eval report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-print-clear-report
          path: samples/eval/reports/ci-print-clear.json
          if-no-files-found: ignore
