# CD: build Windows NSIS installer + mock sidecar (issue #14)
# Artifacts always uploaded; GitHub Release only on v* tags (or manual publish).
name: CD Windows

on:
  # Manual: Actions → CD Windows → Run workflow
  workflow_dispatch:
    inputs:
      create_release:
        description: "Also create/update a GitHub Release from this run (uses tag if present, else draft from sha)"
        type: boolean
        default: false
      release_tag:
        description: "Optional release tag name when create_release=true without a git tag (e.g. v0.1.0-rc1)"
        type: string
        required: false
        default: ""
  # Tag push → full CD + Release
  push:
    tags:
      - "v*"

concurrency:
  group: cd-windows-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  VITE_ENPU_CORE_URL: http://127.0.0.1:8765
  ENPU_RECOGNIZE_ENGINE: mock

jobs:
  build-installer:
    name: Build NSIS installer
    runs-on: windows-latest
    timeout-minutes: 120
    outputs:
      version: ${{ steps.meta.outputs.version }}
      artifact_name: ${{ steps.meta.outputs.artifact_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version metadata
        id: meta
        shell: pwsh
        run: |
          $ver = "0.0.0"
          $conf = "desktop/src-tauri/tauri.conf.json"
          if (Test-Path $conf) {
            $j = Get-Content $conf -Raw | ConvertFrom-Json
            if ($j.version) { $ver = [string]$j.version }
          }
          if ($env:GITHUB_REF -match '^refs/tags/(v.+)$') {
            $ver = $Matches[1].TrimStart('v')
          }
          $sha = $env:GITHUB_SHA.Substring(0, 7)
          $artifact = "EnPu-windows-$ver-$sha"
          "version=$ver" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "artifact_name=$artifact" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "sha_short=$sha" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          Write-Host "version=$ver artifact=$artifact"

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: desktop/package-lock.json

      - name: Setup Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust / Tauri
        uses: swatinem/rust-cache@v2
        with:
          workspaces: desktop/src-tauri -> target
          shared-key: enpu-tauri-windows

      - name: Install core deps + PyInstaller (no Paddle in sidecar)
        working-directory: core
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\pip.exe install -U pip
          .\.venv\Scripts\pip.exe install -r requirements-ci.txt
          .\.venv\Scripts\pip.exe install "pyinstaller>=6.0,<7"

      - name: Build mock enpu-core sidecar
        working-directory: core
        shell: pwsh
        run: |
          .\.venv\Scripts\python.exe -m PyInstaller --noconfirm --clean enpu-core.spec
          if (-not (Test-Path "dist\enpu-core.exe")) { throw "sidecar missing: dist\enpu-core.exe" }
          $mb = [math]::Round((Get-Item "dist\enpu-core.exe").Length / 1MB, 2)
          Write-Host "sidecar OK: $mb MB"

      - name: Prepare Tauri externalBin (target triple)
        shell: pwsh
        run: .\scripts\prepare-sidecar.ps1 -SkipBuild

      - name: Prepare core app resources (paddle post-install sources)
        shell: pwsh
        run: .\scripts\prepare-core-app-resources.ps1

      - name: Install desktop npm deps
        working-directory: desktop
        run: npm ci

      - name: Tauri build NSIS installer
        working-directory: desktop
        shell: pwsh
        env:
          VITE_ENPU_CORE_URL: ${{ env.VITE_ENPU_CORE_URL }}
        run: |
          # Must use `--` so npm forwards args to tauri CLI
          npm run tauri -- build --bundles nsis
          $nsis = Get-ChildItem -Path "src-tauri\target\release\bundle\nsis" -Filter "*.exe" -ErrorAction SilentlyContinue
          if (-not $nsis) { throw "NSIS installer not found under src-tauri/target/release/bundle/nsis" }
          $nsis | ForEach-Object {
            Write-Host ("installer: {0} ({1} MB)" -f $_.FullName, [math]::Round($_.Length/1MB, 2))
          }

      - name: Stage release files
        id: stage
        shell: pwsh
        run: |
          $out = "dist-cd"
          New-Item -ItemType Directory -Force -Path $out | Out-Null
          Copy-Item "desktop\src-tauri\target\release\bundle\nsis\*.exe" $out -Force
          Copy-Item "core\dist\enpu-core.exe" $out -Force
          # checksums
          Get-ChildItem $out -File | ForEach-Object {
            $h = (Get-FileHash $_.FullName -Algorithm SHA256).Hash
            "$h  $($_.Name)" | Add-Content "$out\SHA256SUMS.txt"
            Write-Host "$($_.Name) $h"
          }
          Get-ChildItem $out | Format-Table Name, Length

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: dist-cd/**
          if-no-files-found: error
          retention-days: 30

  publish-release:
    name: GitHub Release
    needs: build-installer
    runs-on: ubuntu-latest
    # Tag push always; manual only if create_release input is true
    if: >
      startsWith(github.ref, 'refs/tags/v') ||
      (github.event_name == 'workflow_dispatch' && inputs.create_release == true)
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build-installer.outputs.artifact_name }}
          path: release-files

      - name: Resolve release tag
        id: tag
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
            echo "draft=false" >> "$GITHUB_OUTPUT"
          else
            TAG="${{ inputs.release_tag }}"
            if [[ -z "$TAG" ]]; then
              TAG="cd-${{ needs.build-installer.outputs.version }}-${GITHUB_SHA::7}"
            fi
            echo "tag=$TAG" >> "$GITHUB_OUTPUT"
            echo "draft=true" >> "$GITHUB_OUTPUT"
          fi
          ls -la release-files

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: EnPu ${{ steps.tag.outputs.tag }}
          draft: ${{ steps.tag.outputs.draft }}
          generate_release_notes: true
          files: release-files/*
          fail_on_unmatched_files: true
          body: |
            ## Windows installer (CD)

            - **Version**: ${{ needs.build-installer.outputs.version }}
            - **Sidecar**: mock engine (offline). Post-install may set up PaddleOCR if Python is available.
            - **Artifact**: NSIS setup + `enpu-core.exe` + `SHA256SUMS.txt`

            See `docs/release-windows.md`.
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
